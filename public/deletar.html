<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remover Orçamento</title>
    <link rel="shortcut icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <ul>
                <li class="navbar-logo"><a href="index.html">Garagem Reis</a></li>
                <li><a href="criar.html">Novo</a></li>
                <li><a href="listar.html">Listar</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🗑️ Remover Orçamento</h1>
            <p>Busque pelo ID e confirme a exclusão</p>
        </div>

        <div class="form-container">
            <div class="busca-area">
                <label>ID do Orçamento:</label>
                <div>
                    <input type="number" id="buscar-id" placeholder="Digite o ID">
                    <button class="btn-search" onclick="buscarOrcamento()">Buscar</button>
                </div>
            </div>

            <div id="info" style="display: none;"></div>

            <button id="btn-deletar" class="btn-submit" style="background-color: #dc3545; display: none;" onclick="deletarOrcamento()">
                Confirmar Remoção
            </button>

            <div id="resultado" class="resultado"></div>
        </div>
    </div>

    <script src="script.js"></script>
<script>
    let idAtual = null;
    
    async function buscarOrcamento() {
        const id = document.getElementById('buscar-id').value;
        if (!id) {
            alert('Digite um ID');
            return;
        }
        
        try {
            const response = await fetch(`/orcamento/${id}`);
            
            if (response.ok) {
                const orcamento = await response.json();
                idAtual = orcamento.id;
                
                // Mostrar informações do orçamento
                document.getElementById('info').innerHTML = `
                    <div class="info-card">
                        <p><strong>⚠️ Tem certeza que deseja remover?</strong></p>
                        <p><strong>Orçamento #${orcamento.id}</strong></p>
                        <p>Cliente: ${orcamento.cliente}</p>
                        <p>Veículo: ${orcamento.veiculo}</p>
                        <p>Serviço: ${orcamento.servico}</p>
                        <p>Valor: R$ ${parseFloat(orcamento.valor).toFixed(2)}</p>
                        <p>Status: ${orcamento.status}</p>
                        <p style="color: #dc3545; margin-top: 10px;">⚠️ Esta ação não pode ser desfeita!</p>
                    </div>
                `;
                document.getElementById('info').style.display = 'block';
                document.getElementById('btn-deletar').style.display = 'block';
                document.getElementById('resultado').classList.remove('show');
                
            } else {
                alert('Orçamento não encontrado');
                document.getElementById('info').style.display = 'none';
                document.getElementById('btn-deletar').style.display = 'none';
                idAtual = null;
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Erro ao buscar orçamento');
        }
    }
    
    async function deletarOrcamento() {
        if (!confirm(`⚠️ Confirmar remoção do orçamento #${idAtual}? Esta ação não pode ser desfeita!`)) {
            return; 
        }
        
        const btn = document.getElementById('btn-deletar');
        const textoOriginal = btn.innerHTML;
        btn.innerHTML = 'Removendo... ⏳';
        btn.disabled = true;
        
        try {
            const response = await fetch(`/orcamento/${idAtual}`, {
                method: 'DELETE'
            });
            
            const data = await response.json();
            const div = document.getElementById('resultado');
            
            if (response.ok && data.success) {

                div.innerHTML = `<div class="mensagem-sucesso">✅ ${data.message}</div>`;
                div.classList.add('show');
                
                document.getElementById('buscar-id').value = '';
                document.getElementById('info').style.display = 'none';
                document.getElementById('btn-deletar').style.display = 'none';
                idAtual = null;
                
                setTimeout(() => {
                    div.classList.remove('show');
                }, 3000);
                
            } else {
                div.innerHTML = `<div class="mensagem-erro">❌ ${data.error || 'Erro ao remover'}</div>`;
                div.classList.add('show');
            }
        } catch (error) {
            console.error('Erro:', error);
            document.getElementById('resultado').innerHTML = `<div class="mensagem-erro">❌ Erro de conexão</div>`;
            document.getElementById('resultado').classList.add('show');
        } finally {
            btn.innerHTML = textoOriginal;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
